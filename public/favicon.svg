<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .bg { fill: #0a0a0a; }
    .border { fill: none; stroke: #c8ff3a; stroke-width: 2; }
    .text { fill: #c8ff3a; font-family: 'Courier New', Courier, monospace; font-weight: 900; font-size: 20px; letter-spacing: -1px; }
    @media (prefers-color-scheme: light) {
      .bg { fill: #ffffff; }
      .border { stroke: #0a0a0a; }
      .text { fill: #0a0a0a; }
    }
  </style>
  <rect class="bg" width="32" height="32"/>
  <rect class="border" x="1" y="1" width="30" height="30"/>
  <text class="text" x="16" y="23" text-anchor="middle">MC</text>
</svg>
